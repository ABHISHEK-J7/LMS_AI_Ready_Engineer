name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm test --workspace LMS_Backend

      - name: Frontend tests
        run: npm test --workspace LMS_Frontend

      - name: Build student/trainer app
        run: npm run build --workspace LMS_Frontend

      - name: Build admin app
        run: npm run build --workspace LMS_Admin
