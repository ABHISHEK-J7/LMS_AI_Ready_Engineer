server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't advertise the server version.
  server_tokens off;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── API + uploaded files → backend ────────────────────────────────────────
  location /api/ {
    client_max_body_size 105m;          # allow learning-resource uploads
    proxy_pass http://backend:5050;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;            # AI grading can take a few seconds
  }

  # ── Hashed static assets — long cache ─────────────────────────────────────
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
