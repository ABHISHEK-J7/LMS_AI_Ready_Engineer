# Single-domain production serving for AI Ready Engineer.
#   /        -> LMS_Frontend/dist  (student + trainer SPA)
#   /admin/  -> LMS_Admin/dist     (admin SPA, built with base:/admin/)
#   /api/    -> Node backend on 127.0.0.1:5050
#
# This serves the STATIC production builds. Do NOT run `npm run dev` in prod.
# After every `git pull`, rebuild both dist/ folders (see LMS_Deployment/README.md).

server {
    listen 80;
    server_name aiengineer.toriiminds.com;
    # (Certbot / your TLS terminator adds the 443 block + redirect.)

    # Uploads can be large (video, etc.) — must exceed the app's max upload size.
    client_max_body_size 110m;

    # ---- Admin SPA at /admin ------------------------------------------------
    # Note the trailing-slash alias + fallback to /admin/index.html so deep
    # links (e.g. /admin/batches) resolve to the admin bundle, not the frontend.
    location /admin/ {
        alias /var/www/aiengineer/LMS_Admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
    # Bare /admin -> /admin/
    location = /admin {
        return 301 /admin/;
    }

    # ---- API ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (LiveKit signaling / any ws the app uses)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- Frontend SPA at / (must stay LAST) ---------------------------------
    location / {
        root /var/www/aiengineer/LMS_Frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        root /var/www/aiengineer/LMS_Frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
