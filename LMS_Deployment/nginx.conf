# Reverse proxy + static SPA hosting for the AI Ready Engineer LMS.
# `backend` resolves to the API container (see docker-compose.yml).
upstream lms_backend {
    server backend:5050;
}

# Shared proxy settings for the API (incl. /api/uploads file streaming).
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# ── Student / Trainer app (port 80) ───────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large learning-resource uploads (backend cap is 100 MB).
    client_max_body_size 110m;

    location /api/ {
        proxy_pass http://lms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;   # stream uploads through to GridFS
        proxy_read_timeout 300s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Admin app (port 8080) ─────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html-admin;
    index index.html;
    client_max_body_size 110m;

    location /api/ {
        proxy_pass http://lms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
